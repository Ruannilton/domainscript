name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Check formatting
        run: |
          unformatted="$(gofmt -l .)"
          if [ -n "$unformatted" ]; then
            echo "Arquivos não formatados:"
            echo "$unformatted"
            exit 1
          fi

      - name: Vet
        run: go vet ./...

      - name: Build
        run: go build ./...

      - name: Test
        run: go test ./...

  # Garante, a cada push/PR, que o transpilador processa TODOS os exemplos de
  # docs/examples e que cada projeto Go efetivamente emitido compila de verdade
  # (não só os golden/e2e do pacote de testes) — um guarda de regressão sobre a
  # saída real do back-end.
  examples:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build dsc
        run: go build -o dsc ./cmd/dsc

      - name: Validate all examples and compile every emitted Go project
        run: |
          set -euo pipefail

          # Exemplos que o front-end valida (dsc check) mas o back-end ainda
          # NÃO consegue gerar — limitação conhecida e rastreada, não uma
          # regressão. Cada entrada tem de apontar a issue que a mantém aberta.
          #   pizzeria -> ISSUE-7: módulo Kitchen combina UseCase E Policy no
          #   mesmo módulo (wiring de Wire combinado ainda não suportado).
          KNOWN_UNGENERATABLE="pizzeria"

          fail=0
          for dir in docs/examples/*/; do
            name="$(basename "$dir")"

            # Fase 1 — o transpilador processa CADA exemplo (front-end): todos,
            # inclusive os ainda não geráveis, precisam validar limpo.
            echo "::group::dsc check $name"
            ./dsc check "$dir"
            echo "::endgroup::"

            # Fase 2 — gera o projeto Go e roda o compilador Go sobre ele.
            out="$(mktemp -d)"
            if ./dsc gen "$dir" -o "$out"; then
              echo "::group::go build (projeto gerado de $name)"
              # go.sum não é emitido; os projetos gerados podem exigir drivers
              # reais (ex. pgx desde J1.2), então resolve as deps antes de build.
              ( cd "$out" && go mod tidy && go build ./... && go vet ./... )
              echo "::endgroup::"
            elif printf ' %s ' $KNOWN_UNGENERATABLE | grep -q " $name "; then
              echo "::warning title=exemplo não gerável::$name valida (check) mas não gera — limitação conhecida (ver KNOWN_UNGENERATABLE em ci.yml); go build pulado"
            else
              echo "::error title=falha de geração::$name falhou em 'dsc gen' e não está na lista de exceções conhecidas (KNOWN_UNGENERATABLE em ci.yml)"
              fail=1
            fi
          done

          exit "$fail"

  # Ao mergear para main (e SÓ se test + examples passarem), compila o dsc para
  # os principais SOs/arquiteturas e publica uma release rolante "nightly": o
  # binário mais recente de main fica sempre disponível para baixar e testar
  # localmente, numa URL estável (releases/download/nightly/<asset>).
  release:
    needs: [test, examples]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Compila o dsc para todas as plataformas
        run: |
          set -euo pipefail
          mkdir -p dist
          for p in linux/amd64 linux/arm64 darwin/amd64 darwin/arm64 windows/amd64; do
            os="${p%/*}"; arch="${p#*/}"
            ext=""; [ "$os" = windows ] && ext=".exe"
            out="dist/dsc-${os}-${arch}${ext}"
            echo "building $out"
            CGO_ENABLED=0 GOOS="$os" GOARCH="$arch" \
              go build -trimpath -ldflags "-s -w" -o "$out" ./cmd/dsc
          done
          ( cd dist && sha256sum * > SHA256SUMS.txt )
          ls -la dist

      - name: Publica a release rolante (nightly)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          tag="nightly"
          sha="${GITHUB_SHA:0:7}"

          {
            echo "Transpilador \`dsc\` compilado automaticamente do último merge para \`main\` (commit \`$sha\`)."
            echo
            echo "Build **rolante**: este release é sobrescrito a cada merge, então aponta sempre para a versão mais recente de main. A URL de download é estável."
            echo
            echo "Baixe o binário do seu SO/arquitetura:"
            echo "- Linux x86-64 — \`dsc-linux-amd64\`"
            echo "- Linux ARM64 — \`dsc-linux-arm64\`"
            echo "- macOS Intel — \`dsc-darwin-amd64\`"
            echo "- macOS Apple Silicon — \`dsc-darwin-arm64\`"
            echo "- Windows x86-64 — \`dsc-windows-amd64.exe\`"
            echo
            echo "Confira a integridade com \`SHA256SUMS.txt\`. Em Linux/macOS: \`chmod +x dsc-*\` e rode \`./dsc-<...> gen <projeto> -o <saída>\`."
          } > notes.md

          # Recria a release/tag apontando para o commit recém-mergeado, para
          # manter uma URL de download estável no tag fixo "nightly".
          gh release delete "$tag" --yes --cleanup-tag 2>/dev/null || true
          gh release create "$tag" dist/* \
            --target "$GITHUB_SHA" \
            --title "dsc — build contínuo de main ($sha)" \
            --prerelease \
            --notes-file notes.md
